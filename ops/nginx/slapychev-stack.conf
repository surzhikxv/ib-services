# api.slapychev.ru -> FastAPI (app:8000)
server {
    server_name api.slapychev.ru;
    server_tokens off;
    client_max_body_size 50m;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    # Internal API documentation is available only through localhost/SSH.
    location = /docs { return 404; }
    location = /redoc { return 404; }
    location = /openapi.json { return 404; }

    # The generic webhook is additionally protected by an application token.
    location ^~ /webhooks/ {
        client_max_body_size 1m;
        limit_req zone=kontur_webhook burst=10 nodelay;
        limit_conn kontur_connections 10;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=kontur_api burst=60 nodelay;
        limit_conn kontur_connections 20;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/slapychev.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/slapychev.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# flow.slapychev.ru -> n8n (5678)
server {
    server_name flow.slapychev.ru;
    server_tokens off;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
        limit_req zone=kontur_admin burst=120 nodelay;
        limit_conn kontur_connections 40;
        proxy_pass http://127.0.0.1:5678;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/slapychev.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/slapychev.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# bi.slapychev.ru -> Metabase (3000)
server {
    server_name bi.slapychev.ru;
    server_tokens off;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
        limit_req zone=kontur_admin burst=120 nodelay;
        limit_conn kontur_connections 40;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/slapychev.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/slapychev.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.slapychev.ru flow.slapychev.ru bi.slapychev.ru;
    return 301 https://$host$request_uri;
}
