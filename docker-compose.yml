# Контур роста — инфраструктура MVP.
# Поднимает озеро данных (PostgreSQL), оркестратор (n8n), дашборд (Metabase)
# и приложение (FastAPI: health + приём вебхуков + CLI выгрузки).
#
#   docker build --build-arg VCS_REF=local -t kontur-app:latest .
#   docker compose up -d          # поднять локальный контур
#   docker compose run --rm app python -m kontur.cli automation status
#
# Боевой запуск — на VPS. Креды берутся из .env (в git не попадает).

services:
  postgres:
    # Pinned digest: Postgres 16 runtime verified on 2026-07-10.
    image: postgres:16@sha256:fe03a7605299a34ddf5e4f285dff78c3d7190a576b3c6b46f2fcff69f4bffd54
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kontur}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-kontur}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # только локально — наружу БД не светим (доступ через SSH-туннель/сеть compose)
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kontur} -d ${POSTGRES_DB:-kontur}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    # Production deploy stores an immutable GHCR digest in KONTUR_IMAGE.
    # For local development, build kontur-app:latest explicitly first.
    image: ${KONTUR_IMAGE:-kontur-app:latest}
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # внутри сети compose БД доступна по имени сервиса postgres
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-kontur}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-kontur}
      # для provision Metabase (источник-БД подключается по этим параметрам)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-kontur}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-kontur}
      METABASE_URL: ${METABASE_URL:-http://metabase:3000}
      METABASE_USER: ${METABASE_USER:-}
      METABASE_PASSWORD: ${METABASE_PASSWORD:-}
      METABASE_DB_USER: ${METABASE_DB_USER:-metabase_ro}
      METABASE_DB_PASSWORD: ${METABASE_DB_PASSWORD:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-5}
      LLM_EFFORT: ${LLM_EFFORT:-medium}
      # форвард-прокси вне РФ к api.anthropic.com (Hetzner). Пусто = напрямую.
      LLM_PROXY_URL: ${LLM_PROXY_URL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TIKTOK_INGEST_TOKEN: ${TIKTOK_INGEST_TOKEN:-}
      WEBHOOK_INGEST_TOKEN: ${WEBHOOK_INGEST_TOKEN:-}
      WEBHOOK_ALLOWED_SOURCES: ${WEBHOOK_ALLOWED_SOURCES:-}
      INSTAGRAM_AUTH_MODE: ${INSTAGRAM_AUTH_MODE:-instagram}
      INSTAGRAM_ACCESS_TOKEN: ${INSTAGRAM_ACCESS_TOKEN:-}
      INSTAGRAM_USER_ID: ${INSTAGRAM_USER_ID:-}
      INSTAGRAM_PAGE_ID: ${INSTAGRAM_PAGE_ID:-}
      FB_PAGE_ID: ${FB_PAGE_ID:-}
      INSTAGRAM_API_BASE: ${INSTAGRAM_API_BASE:-}
      INSTAGRAM_API_VERSION: ${INSTAGRAM_API_VERSION:-v25.0}
      INSTAGRAM_TIMEZONE: ${INSTAGRAM_TIMEZONE:-Europe/Moscow}
      IG_PROXY_URL: ${IG_PROXY_URL:-}
    # создаём схему+сиды, затем поднимаем API (приём вебхуков)
    command: sh -c "python -m kontur.cli db init && uvicorn kontur.api:app --host 0.0.0.0 --port 8000"
    ports:
      # наружу — только через nginx (api.slapychev.ru); сам порт держим на localhost
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  bot:
    image: ${KONTUR_IMAGE:-kontur-app:latest}
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-kontur}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-kontur}
      PRODAMUS_WEBHOOK_PORT: "8081"
      BOT_MEDIA_DIR: /app/media
    command: ["python", "-m", "bot.bot"]
    volumes:
      - ${KONTUR_MEDIA_DIR:-./media}:/app/media:ro
    ports:
      - "127.0.0.1:${PRODAMUS_WEBHOOK_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    stop_grace_period: 30s

  admin_bot:
    # Закрытая админ-панель. Интерфейс работает от отдельного токена, а рассылка
    # идёт через основной бот: только он уже имеет право писать пользователям /start.
    image: ${KONTUR_IMAGE:-kontur-app:latest}
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-kontur}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-kontur}
      ADMIN_BOT_MEDIA_DIR: /data/admin-broadcasts
    command: ["python", "-m", "bot.admin_bot"]
    # Bind source lets this isolated service be rolled out without replacing the
    # already-running funnel/API image. The media volume survives restarts.
    volumes:
      - .:/app:ro
      - ./data/admin-broadcasts:/data/admin-broadcasts
    stop_grace_period: 30s

  n8n:
    # n8n 2.27.4. Upgrade explicitly after backup and smoke-test.
    image: n8nio/n8n@sha256:cf11c96b0d0089bb24459bf97b445fd7008f41543b673cce4d955f7c0ed8752d
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-change_me}
      GENERIC_TIMEZONE: ${TZ:-Europe/Moscow}
      N8N_PORT: "5678"
      # за обратным прокси (flow.slapychev.ru): корректные URL редактора/вебхуков
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
      N8N_EDITOR_BASE_URL: ${N8N_WEBHOOK_URL:-}
      N8N_PROXY_HOPS: "1"
    volumes:
      - n8ndata:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"

  metabase:
    # Metabase v0.62.3.3. Upgrade explicitly after backup and card-query check.
    image: metabase/metabase@sha256:892bda65791f4f996c1ac0d6bff8876e27dba440faa0c3d7349027ff91aa7c75
    restart: unless-stopped
    # лимит памяти + -Xmx1g: на 8 ГБ-VPS JVM Metabase иначе разрастается и душит соседей
    mem_limit: 1536m
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # внутреннюю БД Metabase держим в отдельном Postgres-каталоге того же сервера —
      # для MVP проще оставить встроенную H2 на томе:
      MB_DB_FILE: /metabase-data/metabase.db
      JAVA_OPTS: -Xmx1g
      # публичный адрес за обратным прокси (для корректных ссылок/писем)
      MB_SITE_URL: ${MB_SITE_URL:-}
    volumes:
      - metabasedata:/metabase-data
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  pgdata:
  n8ndata:
  metabasedata:
