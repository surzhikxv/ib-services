# Контур роста — инфраструктура MVP.
# Поднимает озеро данных (PostgreSQL), оркестратор (n8n), дашборд (Metabase)
# и приложение (FastAPI: health + приём вебхуков + CLI выгрузки).
#
#   docker compose up -d          # поднять всё
#   docker compose run --rm app python -m kontur.cli bothelp sync   # выгрузка BotHelp
#
# Боевой запуск — на VPS. Креды берутся из .env (в git не попадает).

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kontur}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-kontur}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kontur} -d ${POSTGRES_DB:-kontur}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # внутри сети compose БД доступна по имени сервиса postgres
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-kontur}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-kontur}
      # для provision Metabase (источник-БД подключается по этим параметрам)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-kontur}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-kontur}
      METABASE_URL: ${METABASE_URL:-http://metabase:3000}
      METABASE_USER: ${METABASE_USER:-}
      METABASE_PASSWORD: ${METABASE_PASSWORD:-}
      BOTHELP_CLIENT_ID: ${BOTHELP_CLIENT_ID}
      BOTHELP_CLIENT_SECRET: ${BOTHELP_CLIENT_SECRET}
      BOTHELP_OAUTH_URL: ${BOTHELP_OAUTH_URL:-https://oauth.bothelp.io/oauth2/token}
      BOTHELP_API_BASE: ${BOTHELP_API_BASE:-https://api.bothelp.io}
      BOTHELP_BOT_REFERRAL: ${BOTHELP_BOT_REFERRAL}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-claude-opus-4-8}
      LLM_EFFORT: ${LLM_EFFORT:-medium}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    # создаём схему+сиды, затем поднимаем API (приём вебхуков)
    command: sh -c "python -m kontur.cli db init && uvicorn kontur.api:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-change_me}
      GENERIC_TIMEZONE: ${TZ:-Europe/Moscow}
      N8N_PORT: "5678"
    volumes:
      - n8ndata:/home/node/.n8n
    ports:
      - "5678:5678"

  metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # внутреннюю БД Metabase держим в отдельном Postgres-каталоге того же сервера —
      # для MVP проще оставить встроенную H2 на томе:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabasedata:/metabase-data
    ports:
      - "3000:3000"

volumes:
  pgdata:
  n8ndata:
  metabasedata:
